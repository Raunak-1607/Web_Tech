<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dynamic Style Control</title>

    <script src="./Task7.js" defer></script>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        #text {
            padding: 20px;
            font-size: 16px;
            background-color: white;
            text-align: left;
            border: 1px solid rgb(228, 7, 7);
        }

        button {
            padding: 10px;
            margin: 10px 5px;
            border-radius: 8px;
            border: 2px solid royalblue;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Dynamic Style Control Panel</h1>

    <p id="text">
        This is a sample paragraph. You can change its style using the buttons below.
    </p>

    <button id="backgroundBtn">Change Background Color</button>

    <button id="fontBtn">Increase Font Size</button>

    <button id="centerBtn">Center Text</button>

    <button id="resetBtn">Reset Style</button>

</body>

</html>
