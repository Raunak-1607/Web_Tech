<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigation Bar</title>

<style>

*{
    margin:0;
    padding:0;
   
}

body{
    font-family: Arial, sans-serif;
    background:#F5F9FF;
}

div{
    background:#0B2E73;
    width:100%;
    text-align:center;
    padding:20px 0;
}
 a{
    display:inline-block;
    text-decoration:none;
    color:white;
    font-size:20px;
    margin:0 30px;
    padding:12px 22px;
    border-radius:8px;
    
}

nav a:hover{
    background:#3B82F6;
    color:white;
}

</style>

</head>
<body>

<div>
    <nav>
       <a href="#">Home</a>
       <a href="#">About</a>
       <a href="#">Services</a>
       <a href="#">Gallery</a>
       <a href="#">Contact</a>
   </nav>
</div>

</body>
</html>
